name: Search doctype filter E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      deploy_url:
        description: 'Netlify deploy preview URL — only use after confirming the deploy is live in the Netlify dashboard'
        required: true
        type: string

jobs:
  search-doctype-filter-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Netlify deploy to complete for this commit
        id: wait-for-netlify-status
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Waiting for Netlify deploy status on commit $COMMIT_SHA..."
          echo "Netlify can take 15+ minutes to start building during busy periods."

          MAX_ATTEMPTS=240
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            RESULT=$(gh api repos/${{ github.repository }}/commits/$COMMIT_SHA/statuses \
              --jq '[.[] | select(.context == "netlify/leafy-mooncake-7c2e5e/deploy-preview")] | first // empty')

            if [ -z "$RESULT" ]; then
              ATTEMPT=$((ATTEMPT + 1))
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Waiting for Netlify to start..."
              sleep 10
              continue
            fi

            STATUS=$(echo "$RESULT" | jq -r '.state')
            echo "Attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS: Netlify status = $STATUS"

            if [ "$STATUS" = "success" ]; then
              DEPLOY_URL=$(echo "$RESULT" | jq -r '.target_url')
              echo "Netlify deploy completed successfully."
              echo "Deploy URL: $DEPLOY_URL"
              echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "error" ]; then
              echo "Netlify deploy failed."
              exit 1
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 10
          done

          echo "::error::Netlify deploy did not reach 'success' within 40 minutes. Push a retrigger commit or use workflow_dispatch once the preview is live in the Netlify dashboard."
          exit 1

      - name: Wait for Netlify deploy preview URL to be accessible
        uses: jakepartusch/wait-for-netlify-action@v1.4
        id: wait-for-netlify-preview
        if: github.event_name == 'pull_request'
        with:
          site_name: 'leafy-mooncake-7c2e5e'
          max_timeout: 300
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}

      - name: Resolve deploy URL
        id: resolve-url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ inputs.deploy_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ steps.wait-for-netlify-preview.outputs.url }}" >> $GITHUB_OUTPUT
          fi

      - name: Pre-warm routes used by the doctype filter spec
        run: |
          BASE_URL="${{ steps.resolve-url.outputs.url }}"
          echo "Pre-warming routes on: $BASE_URL"

          ROUTES=(
            "/docs/tutorials/about-the-admin-category"
            "/en/docs/tutorials/about-the-admin-category"
          )

          MAX_ATTEMPTS=6
          FAILED_ROUTES=()

          warm_route() {
            local route="$1"
            local attempt=1
            local delay=2
            local status
            while [ $attempt -le $MAX_ATTEMPTS ]; do
              status=$(curl -sS -L -o /dev/null -w "%{http_code}" \
                --max-time 120 "$BASE_URL$route" 2>/dev/null || echo "000")
              if [ "$status" = "200" ]; then
                echo "  OK $route -> HTTP 200 (attempt $attempt/$MAX_ATTEMPTS)"
                return 0
              fi
              echo "  ... $route -> HTTP $status (attempt $attempt/$MAX_ATTEMPTS), retrying in ${delay}s"
              sleep $delay
              delay=$(( delay * 2 ))
              if [ $delay -gt 32 ]; then delay=32; fi
              attempt=$(( attempt + 1 ))
            done
            echo "  FAIL $route never returned 200 after $MAX_ATTEMPTS attempts (last HTTP $status)"
            return 1
          }

          for route in "${ROUTES[@]}"; do
            echo "Warming $route ..."
            warm_route "$route" || FAILED_ROUTES+=("$route")
          done

          if [ ${#FAILED_ROUTES[@]} -eq 0 ]; then
            echo "All ${#ROUTES[@]} routes returned HTTP 200 — preview is warm, proceeding to Cypress."
          else
            echo "::warning title=Pre-warm incomplete::${#FAILED_ROUTES[@]} of ${#ROUTES[@]} route(s) never reached HTTP 200: ${FAILED_ROUTES[*]}. Proceeding to Cypress — in-spec visit retries are the second layer of defense."
          fi

      - name: Run Cypress doctype filter spec
        uses: cypress-io/github-action@v6
        with:
          spec: src/tests/cypress/integration/search-doctype-filter.cy.js
          wait-on: ${{ steps.resolve-url.outputs.url }}
          wait-on-timeout: 120
          install-command: yarn install --ignore-engines
        env:
          CYPRESS_baseUrl: ${{ steps.resolve-url.outputs.url }}

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: search-doctype-filter-screenshots
          path: src/tests/cypress/screenshots
          if-no-files-found: ignore

      - name: Generate test summary
        if: always()
        run: |
          echo "## Search doctype filter E2E" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment URL:** ${{ steps.resolve-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Spec:** \`src/tests/cypress/integration/search-doctype-filter.cy.js\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ job.status }}" == "success" ]]; then
            echo "All doctype filter assertions passed (counts, refresh, snippet hardening)." >> $GITHUB_STEP_SUMMARY
          else
            echo "The doctype filter spec failed. Check logs and artifacts for details." >> $GITHUB_STEP_SUMMARY
          fi
