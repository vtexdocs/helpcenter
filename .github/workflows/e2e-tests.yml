name: E2E Tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      deploy_url:
        description: 'Netlify deploy preview URL — only use after confirming the deploy is live in the Netlify dashboard'
        required: true
        type: string

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Netlify deploy to complete for this commit
        id: wait-for-netlify-status
        if: github.event_name == 'pull_request'
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Polling Netlify API for deploy state on commit $COMMIT_SHA..."
          MAX_ATTEMPTS=240
          ATTEMPT=0
          SITE_ID="leafy-mooncake-7c2e5e"

          HTTP_CODE=$(curl -s -o /tmp/nr.json -w "%{http_code}" \
            -H "Authorization: Bearer $NETLIFY_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys?per_page=5")
          echo "Debug: HTTP $HTTP_CODE"
          jq '[.[] | {id, state, branch, commit_ref}] | .[0:3]' /tmp/nr.json 2>&1 || cat /tmp/nr.json | head -c 200

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            DEPLOY=$(curl -sf \
              -H "Authorization: Bearer $NETLIFY_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys?per_page=20" \
              | jq --arg sha "$COMMIT_SHA" '[.[] | select(.commit_ref == $sha)] | first // empty')

            if [ -z "$DEPLOY" ]; then
              ATTEMPT=$((ATTEMPT + 1))
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: No deploy found for this commit yet..."
              sleep 10
              continue
            fi

            STATE=$(echo "$DEPLOY" | jq -r '.state')
            echo "Attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS: Netlify deploy state = $STATE"

            if [ "$STATE" = "ready" ]; then
              DEPLOY_URL=$(echo "$DEPLOY" | jq -r '.deploy_ssl_url')
              echo "Netlify deploy ready: $DEPLOY_URL"
              echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATE" = "error" ]; then
              echo "::error::Netlify deploy failed (state=error). Check the Netlify dashboard for build logs."
              exit 1
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 10
          done

          echo "::error::Netlify deploy did not reach 'ready' within 40 minutes. Infrastructure delay, not a code regression. Use workflow_dispatch to re-run manually once the deploy is live."
          exit 1

      - name: Resolve deploy URL
        id: resolve-url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ inputs.deploy_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ steps.wait-for-netlify-status.outputs.deploy_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          wait-on: ${{ steps.resolve-url.outputs.url }}
          wait-on-timeout: 120
          install-command: yarn install --ignore-engines
        env:
          CYPRESS_baseUrl: ${{ steps.resolve-url.outputs.url }}

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: src/tests/cypress/screenshots
          if-no-files-found: ignore

      - name: Generate test summary
        if: always()
        run: |
          echo "## 🧪 Cypress E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment URL:** ${{ steps.resolve-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed. Check the logs and artifacts for details." >> $GITHUB_STEP_SUMMARY
          fi

          if [[ -f "./cypress.log" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Test Log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat cypress.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Suites" >> $GITHUB_STEP_SUMMARY
          echo "- Navigation Status Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Copy for AI Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Locale Switching Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Sidebar Navigation Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Regression Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Results Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Autocomplete Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Locale Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Pagination Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Doctype Filter Tests (4 pending — unblocked by vtexdocs/components PR #82)" >> $GITHUB_STEP_SUMMARY
