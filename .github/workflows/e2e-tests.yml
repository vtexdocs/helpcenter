name: E2E Tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      deploy_url:
        description: 'Netlify deploy preview URL — only use after confirming the deploy is live in the Netlify dashboard'
        required: true
        type: string

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Netlify deploy to complete for this commit
        id: wait-for-netlify-status
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Waiting for Netlify deploy status on commit $COMMIT_SHA..."
          echo "Netlify can take 15+ minutes to start building during busy periods."

          # Total timeout: 40 minutes (240 * 10 seconds)
          # This accounts for Netlify queue delays + build time
          MAX_ATTEMPTS=240
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            # Get the most recent status for deploy-preview context
            # The API returns statuses in reverse chronological order (newest first)
            RESULT=$(gh api repos/${{ github.repository }}/commits/$COMMIT_SHA/statuses \
              --jq '[.[] | select(.context == "netlify/leafy-mooncake-7c2e5e/deploy-preview")] | first // empty')

            if [ -z "$RESULT" ]; then
              ATTEMPT=$((ATTEMPT + 1))
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Waiting for Netlify to start..."
              sleep 10
              continue
            fi

            STATUS=$(echo "$RESULT" | jq -r '.state')
            echo "Attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS: Netlify status = $STATUS"

            if [ "$STATUS" = "success" ]; then
              DEPLOY_URL=$(echo "$RESULT" | jq -r '.target_url')
              echo "✅ Netlify deploy completed successfully!"
              echo "Deploy URL: $DEPLOY_URL"
              echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "error" ]; then
              echo "❌ Netlify deploy failed!"
              exit 1
            fi

            # Status is "pending" - keep waiting
            ATTEMPT=$((ATTEMPT + 1))
            sleep 10
          done

          echo "::error::Netlify deploy did not reach 'success' within 40 minutes. This is an infrastructure delay, not a code regression. Options: (1) push a retrigger commit, (2) use the workflow_dispatch manual trigger once the deploy is live in the Netlify dashboard."
          exit 1

      - name: Wait for Netlify deploy preview URL to be accessible
        uses: jakepartusch/wait-for-netlify-action@v1.4
        id: wait-for-netlify-preview
        if: github.event_name == 'pull_request'
        with:
          site_name: 'leafy-mooncake-7c2e5e'
          max_timeout: 300
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}

      - name: Resolve deploy URL
        id: resolve-url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ inputs.deploy_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ steps.wait-for-netlify-preview.outputs.url }}" >> $GITHUB_OUTPUT
          fi

      - name: Pre-warm all statically-known routes (sequential, retry-until-200)
        run: |
          BASE_URL="${{ steps.resolve-url.outputs.url }}"
          echo "Pre-warming routes on: $BASE_URL"

          # Every statically-known path the Cypress suite visits (cy.visit / cy.request),
          # audited per spec. /api/navigation is a Netlify Function (separate cold-start
          # from the CDN). Dynamic paths (copy-for-llm, helpcenter-navigation-status) are
          # derived from the /api/navigation response and warmed in-spec — they cannot be
          # enumerated statically here.
          ROUTES=(
            "/api/navigation"
            "/"
            "/docs/tutorials"
            "/docs/tutorials/about-the-admin-category"
            "/docs/tutorials/accessing-the-beta-environment"
            "/pt/docs/tutorials"
            "/pt/docs/tutorials/sobre-o-admin-categoria"
            "/pt/docs/tutorials/acessar-o-ambiente-beta-pelo-dominio-myvtex-com"
            "/es/docs/tutorials"
            "/es/docs/tutorials/acerca-de-admin-categoria"
            "/es/docs/tutorials/acceder-al-ambiente-beta"
          )

          MAX_ATTEMPTS=6
          FAILED_ROUTES=()

          # Warm one route, retrying until HTTP 200 with exponential backoff (2s→32s).
          # Any non-200 — including the transient 403 from Netlify's abuse/DDoS layer
          # (B-5) and cold-render 5xx/timeouts — is treated as retryable.
          warm_route() {
            local route="$1"
            local attempt=1
            local delay=2
            local status
            while [ $attempt -le $MAX_ATTEMPTS ]; do
              # -L follows the locale redirect (/docs/... → /en/docs/...) so the real
              # ISR cache key is rendered and cached, exactly as the browser does.
              status=$(curl -sS -L -o /dev/null -w "%{http_code}" \
                --max-time 120 "$BASE_URL$route" 2>/dev/null || echo "000")
              if [ "$status" = "200" ]; then
                echo "  ✓ $route → HTTP 200 (attempt $attempt/$MAX_ATTEMPTS)"
                return 0
              fi
              echo "  … $route → HTTP $status (attempt $attempt/$MAX_ATTEMPTS), retrying in ${delay}s"
              sleep $delay
              delay=$(( delay * 2 ))
              if [ $delay -gt 32 ]; then delay=32; fi
              attempt=$(( attempt + 1 ))
            done
            echo "  ✗ $route never returned 200 after $MAX_ATTEMPTS attempts (last HTTP $status)"
            return 1
          }

          # Sequential (concurrency 1): keeps origin load low so warming does not itself
          # trigger the load-correlated throttling we are trying to avoid (B-5).
          for route in "${ROUTES[@]}"; do
            echo "Warming $route ..."
            warm_route "$route" || FAILED_ROUTES+=("$route")
          done

          if [ ${#FAILED_ROUTES[@]} -eq 0 ]; then
            echo "✅ All ${#ROUTES[@]} routes returned HTTP 200 — preview is warm, proceeding to Cypress."
          else
            echo "::warning title=Pre-warm incomplete::${#FAILED_ROUTES[@]} of ${#ROUTES[@]} route(s) never reached HTTP 200 after ${MAX_ATTEMPTS} retries: ${FAILED_ROUTES[*]}. This matches the known transient Netlify deploy-preview 403/cold-start throttling under CI load (B-5, EDU-18407). Proceeding to Cypress — the in-spec warm-then-visit hooks and cy.visit retries are the second layer of defense. If many specs then fail with cy.visit 403, re-run after the preview settles."
          fi

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          wait-on: ${{ steps.resolve-url.outputs.url }}
          wait-on-timeout: 120
          install-command: yarn install --ignore-engines
        env:
          CYPRESS_baseUrl: ${{ steps.resolve-url.outputs.url }}

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: src/tests/cypress/screenshots
          if-no-files-found: ignore

      - name: Generate test summary
        if: always()
        run: |
          echo "## 🧪 Cypress E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment URL:** ${{ steps.resolve-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed. Check the logs and artifacts for details." >> $GITHUB_STEP_SUMMARY
          fi

          if [[ -f "./cypress.log" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Test Log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat cypress.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Suites" >> $GITHUB_STEP_SUMMARY
          echo "- Navigation Status Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Copy for AI Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Locale Switching Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Sidebar Navigation Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Regression Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Results Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Autocomplete Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Locale Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Pagination Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Search Doctype Filter Tests (4 pending — unblocked by vtexdocs/components PR #82)" >> $GITHUB_STEP_SUMMARY
